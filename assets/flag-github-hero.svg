<svg width="1600" height="520" viewBox="0 0 1600 520" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">FLAG Media Art and Creative Technology</title>
  <desc id="desc">A blue and white abstract media art banner for the FLAG GitHub organization profile.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="520" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#09111F"/>
      <stop offset="0.48" stop-color="#132B6E"/>
      <stop offset="1" stop-color="#F7FAFF"/>
    </linearGradient>
    <linearGradient id="beam" x1="190" y1="80" x2="1300" y2="480" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0"/>
      <stop offset="0.32" stop-color="#8FB4FF" stop-opacity="0.75"/>
      <stop offset="0.68" stop-color="#FFFFFF" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0.03"/>
    </linearGradient>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.25 0 0 0 0 0.45 0 0 0 0 1 0 0 0 0.65 0"/>
      <feBlend in="SourceGraphic"/>
    </filter>
  </defs>

  <rect width="1600" height="520" rx="28" fill="url(#bg)"/>
  <path d="M0 430C190 340 320 338 505 400C760 485 1025 455 1600 160V520H0V430Z" fill="#FFFFFF" fill-opacity="0.08"/>
  <path d="M-80 362C220 274 472 236 704 248C980 262 1162 210 1710 -60" stroke="url(#beam)" stroke-width="120" stroke-linecap="round" filter="url(#softGlow)"/>
  <path d="M1060 70L1540 0V520L900 520L1060 70Z" fill="#FFFFFF" fill-opacity="0.9"/>

  <g opacity="0.85">
    <rect x="84" y="72" width="230" height="132" rx="20" fill="url(#panel)" stroke="#DCE7FF" stroke-opacity="0.22"/>
    <rect x="348" y="118" width="155" height="86" rx="16" fill="url(#panel)" stroke="#DCE7FF" stroke-opacity="0.16"/>
    <rect x="606" y="64" width="200" height="112" rx="18" fill="url(#panel)" stroke="#DCE7FF" stroke-opacity="0.18"/>
    <rect x="206" y="330" width="220" height="92" rx="18" fill="url(#panel)" stroke="#DCE7FF" stroke-opacity="0.16"/>
    <rect x="548" y="304" width="155" height="70" rx="14" fill="url(#panel)" stroke="#DCE7FF" stroke-opacity="0.14"/>
  </g>

  <g opacity="0.52">
    <circle cx="154" cy="116" r="5" fill="#EAF1FF"/>
    <circle cx="244" cy="164" r="5" fill="#EAF1FF"/>
    <circle cx="394" cy="148" r="4" fill="#EAF1FF"/>
    <circle cx="674" cy="116" r="5" fill="#EAF1FF"/>
    <circle cx="620" cy="338" r="4" fill="#EAF1FF"/>
    <path d="M154 116L244 164L394 148L674 116L620 338" stroke="#EAF1FF" stroke-opacity="0.5"/>
  </g>

  <g transform="translate(116 214)">
    <text x="0" y="0" fill="#FFFFFF" font-family="Arial, Helvetica, sans-serif" font-size="98" font-weight="800" letter-spacing="8">FLAG</text>
    <rect x="4" y="34" width="476" height="3" fill="#FFFFFF" fill-opacity="0.82"/>
    <text x="4" y="86" fill="#DDE8FF" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="600" letter-spacing="5">MEDIA ART · CREATIVE TECHNOLOGY</text>
    <text x="4" y="132" fill="#FFFFFF" fill-opacity="0.82" font-family="Arial, Helvetica, sans-serif" font-size="24">Light, space, interaction, and systems for exhibition experiences.</text>
  </g>

  <g transform="translate(1110 160)">
    <text x="0" y="0" fill="#334DB6" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="800" letter-spacing="4">SPATIAL</text>
    <text x="0" y="54" fill="#111827" font-family="Arial, Helvetica, sans-serif" font-size="56" font-weight="800">MEDIA</text>
    <text x="0" y="112" fill="#111827" font-family="Arial, Helvetica, sans-serif" font-size="56" font-weight="800">ART</text>
    <rect x="2" y="148" width="310" height="2" fill="#334DB6"/>
    <text x="0" y="192" fill="#475467" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="600">Projection · Interactive · Operation</text>
  </g>
</svg>
